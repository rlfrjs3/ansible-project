[defaults]    #기본 동작 설정
inventory      = ./aws_ec2.yml
roles_path    = ./roles
forks = 50
host_key_checking = False
pipelining = True
interpreter_python = auto_silent
enable_plugins = aws_ec2


[privilege_escalation]   #권한 상승 설정
become = True
become_method = sudo
become_user = root 


[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ProxyCommand="ssh -W %h:%p -q -o StrictHostKeyChecking=no -i iac_keypair.pem ec2-user@BASTION_IP_PLACEHOLDER"
