---
- name: 클릭엔 fail2ban 설치&설정   
  hosts: setting
  user: zlxpf
  become: true
  become_method: sudo 



  vars:
    ansible_python_interpreter: /usr/libexec/platform-python
    nginx_log_path: "/web_log/*/access.log"
    whitelist_ips: "127.0.0.1/8 ::1 106.246.242.226 110.93.150.0/24 114.111.32.0/24 211.249.46.0/24 110.93.146.0/24 125.209.235.0/24"



  tasks:
    - name: 1. fail2ban 패키지 설치
      block:
        - name: 1-1. 설치 설정 임시변경
          command: dnf config-manager --setopt=*.skip_if_unavailable=True --save
 
        - name: 1-2. 패키지 설치
          dnf: 
            name: fail2ban
            state: present
        
        - name: 1-3. 설정 원복
          command: dnf config-manager --setopt=*.skip_if_unavailable=False --save
식
    - name: 2. nginx-ddos filter 설정    #어떤 패턴이 공격인지를 정의하는 정규 표현식
      copy: 
        dest: /etc/fail2ban/filter.d/nginx-ddos.conf
        owner: root
        group: root
        mode: '0644'
        content: | 
          [Definition]
          
          # 로그에서 IP 주소를 인식하는 정규식입니다.
          failregex = ^<HOST> -.*"
             
          # 제외할 패턴들을 나열합니다.
          # (?i) : 대소문자 무시, 정적 파일(css, js 등) 및 특정 경로 제외
          ignoreregex = ^<HOST> .* "(GET|POST|HEAD) .*\.(?i)(css|js|jpg|jpeg|png|gif|ico|webp|svg|woff|woff2|ttf|eot)(\?[^"]*)? HTTP/.*"
                        ^<HOST> .* "GET /file/[0-9]+(\?[^"]*)? HTTP/.*"              
                        ^<HOST> .* "GET /(gallerys|boards|productGroups|products/benefits|contactform|modules)(/|\?|\s).* HTTP/.*"

    - name: 3. nginx-ddos action 설정     #패턴이 확인되면 어떻게 액션을 할 것인지 
      copy:
        dest: /etc/fail2ban/action.d/nginx-ddos.conf
        owner: root
        group: root
        mode: '0644'
        content: | 
          [Definition]
          
          # 차단 시 실행할 명령어 (<ip>는 Fail2Ban이 자동으로 치환해줍니다)
          actionban = /usr/local/manage_hosting/nginx-ddos-notification.sh <ip> "<logpath>"
 
          # 차단 해제 시 실행할 명령어 (필요 없다면 비워두거나 생략 가능)
          actionunban =

          # 아래는 기본값이므로 그대로 둡니다.
          actionstart =
          actionstop =
          actioncheck = 

    - name: 4. 로깅 스크립트 생성     
      copy: 
        dest: /usr/local/manage_hosting/nginx-ddos-notification.sh
        owner: root
        group: root
        mode: '0700'
        content: | 
          #!/bin/bash
          
          IP=$1
          LOG_PATTERN=$2
          DATE=$(date "+%Y-%m-%d %H:%M:%S")
          
          #해당 IP가 접속한 기록이 있는 파일을 찾는다.
          DETECTED_FILE=$(grep -l "$IP" $LOG_PATTERN 2>/dev/null | head -n 1)
          
          if [ -z "$DETECTED_FILE" ]; then
              VHOST="Unknown"
              DETECTED_FILE="Not found (Pattern: $LOG_PATTERN)"
          else
              VHOST=$(basename "$(dirname "$DETECTED_FILE")")
          fi
          
          # Vhost 이름이 함께 출력되도록 구성했습니다.
          echo "[$DATE] Banned IP: $IP | Target Vhost: $VHOST | Log File: $DETECTED_FILE" >> /var/log/nginx-ddos-custom.log
  
          # 2. (예시) 필요한 다른 로직 추가 (Slack 알림, DB insert 등)
          # curl -X POST -H 'Content-type: application/json' --data "{\"text\":\"차단됨: $IP\"}" 
          # https://hooks.slack.com/services/T000/B000/XXXX
        
    - name: 5. jail.local 설정         #감옥이 어떻게 실행될 것인지에 대한 내용
      copy:
        dest: /etc/fail2ban/jail.local
        owner: root
        group: root
        mode: '0644'
        content: |
          [nginx-ddos]
          enabled = true
          filter  = nginx-ddos       
          port    = http,https
          protocol = tcp

          # Nginx 로그 경로 (100개 vhost 고려)
          logpath = {{ nginx_log_path }}

          # 감지 조건: 10초 동안 100번 이상 요청 시 차단
          findtime = 10
          maxretry = 100

          # 차단 시간: 24시간 (86400초)
          bantime  = 86400

          # 화이트리스트 (로컬, 사무실 IP 등)
          ignoreip = {{ whitelist_ips }}

          # [Action 설정 부분 수정]
          # 1. 기본 iptables 차단 (기존 설정 유지)
          # 2. 커스텀 스크립트 실행 (my-script)
          action = iptables-multiport[name=nginx-ddos, port="http,https", protocol=tcp]
                   nginx-ddos[logpath="%(logpath)s"]
    
    - name: 6. iptables.conf 액션 설정
      replace: 
        path: /etc/fail2ban/action.d/iptables.conf
        regexp: '^blocktype = REJECT --reject-with (icmp-port-unreachable|icmp6-port-unreachable)'
        replace: '#\0\nblocktype = DROP'

    - name: 7. fail2ban 로깅 설정 변경 (INFO -> NOTICE)
      replace: 
        path: /etc/fail2ban/fail2ban.conf
        regexp: '^(loglevel\s*=\s*INFO)'
        replace: '# \1\nloglevel = NOTICE'
      
    - name: 8. fail2ban 서비스 시작
      block:
        - name: 8-1 fail2ban Syntax check
          shell: | 
            fail2ban-server -t
          register: config_check
          changed_when: false

        - name: 8-2 fail2ban 시작 및 enable
          service:
            name: fail2ban
            state: restarted
            enabled: yes
          when: config_check.rc == 0
    
    - name: 9. nginx_logrotate 크론 reload 추가
      blockinfile:
        path: /usr/local/manage_hosting/nginx_logrotate
        insertafter: EOF
        marker: ""
        block: | 
        
          # fail2ban reload
          fail2ban-client reload nginx-ddos
    
    - name: 10. jail 상태 확인
      shell: | 
        fail2ban-client status nginx-ddos 



 


    
       
        










