---
- name: 방화벽 인바운드 추가 플레이북 (단일 ip 입력만 가능)
  hosts: setting 
  user: zlxpf
  become: yes
  become_method: sudo

  vars:
    firewall_conf: "/usr/local/manage_hosting/firewall/conf/input_accept.conf"

  vars_prompt:
    - name: "ip"
      prompt: "추가할 ip를 입력하세요 (ex. 1.1.1.1 또는 1.1.1.0/24)"
      private: no
    
    - name: "port"
      prompt: "오픈할 서버 포트를 입력하세요"
      private: no

    - name: "comment"
      prompt: "주석을 입력하세요"
      private: no




  tasks:
    - name: 입력ip 체크
      shell: |
        grep -E "^{{ ip }}[[:space:]]+0:[[:space:]]+{{ port }}[[:space:]]+tcp" "{{ firewall_conf }}"
      register: ip_check
      ignore_errors: yes

    - name: 존재한다면 메시지 출력
      debug: 
        msg: "해당 IP({{ ip }})와 PORT({{ port }})는 이미 설정파일에  존재합니다!"
      when: ip_check.rc == 0

    - name: 코멘트 추가
      lineinfile:
        path: "{{ firewall_conf }}"
        line: "\n# {{ comment }}"
        state: present
        backup: yes
      when: ip_check.rc != 0

    - name: IP 정책 추가
      lineinfile:
        path: "{{ firewall_conf }}"
        line: "{{ item }}           0:      {{ port }}   tcp"      #ip 범위로 넣을때는 tcp를 range로 변경해서 사용
        state: present
        backup: yes
      loop: "{{ ip.split(' ') }}"  #여러 개 ip 넣을때 공백으로 구분
      when: ip_check.rc != 0

    - name: 방화벽 재시작
      shell: /etc/init.d/firewall restart
      when: ip_check.rc != 0






  




 
